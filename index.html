<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小明的个人名片</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="page-container">
        <div class="card" id="card">
            <div class="avatar-section">
                <div class="avatar" id="avatar">
                    <span class="avatar-placeholder">明</span>
                </div>
            </div>
            <h1 class="name">小明</h1>
            <p class="tagline">正在学习用 AI 开发程序</p>
            <hr class="divider">
            <div class="contact-section">
                <div class="contact-item">
                    <i class="fa-solid fa-envelope contact-icon"></i>
                    <span class="contact-text">xiaoming@example.com</span>
                </div>
            </div>
            <div class="button-section">
                <button class="btn-save" id="btnSave" onclick="saveContact()">
                    <i class="fa-solid fa-floppy-disk"></i> 保存名片
                </button>
                <button class="btn-share" id="btnShare" onclick="shareCard()">
                    <i class="fa-solid fa-share-nodes"></i> 分享名片
                </button>
            </div>
        </div>
        <button class="btn-contact" id="btnContact" onclick="showEmailModal()">
            <i class="fa-solid fa-paper-plane"></i> 联系我
        </button>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeEmailModal()">
        <div class="modal-box" id="modalBox" onclick="event.stopPropagation()">
            <div class="modal-header">
                <i class="fa-solid fa-envelope-open-text modal-icon"></i>
                <h3 class="modal-title">我的邮箱</h3>
            </div>
            <div class="modal-body">
                <p class="modal-text">xiaoming@example.com</p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn-copy" onclick="copyEmailAndClose()">
                    <i class="fa-solid fa-copy"></i> 复制邮箱
                </button>
                <button class="modal-btn-close" onclick="closeEmailModal()">
                    <i class="fa-solid fa-xmark"></i> 关闭
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
