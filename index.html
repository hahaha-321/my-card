<!--
============================================
文件名称：index.html
功能说明：个人名片网页的主页面
作者：Reasonix AI 助手
创建日期：2026年6月11日
============================================
这个文件是名片网页的入口，双击它就能在浏览器里看到名片。
它包含了名片的 HTML 结构，并引入了样式和脚本文件。
-->
<!DOCTYPE html> <!-- 声明这是一个 HTML5 文档，告诉浏览器用最新的标准来解析 -->
<html lang="zh-CN"> <!-- 网页根标签，lang="zh-CN" 表示网页语言是简体中文 -->
<head> <!-- 头部区域：放网页的元信息，不会直接显示在页面上 -->
    <meta charset="UTF-8"> <!-- 设置字符编码为 UTF-8，保证中文不会乱码 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 让网页在手机上也能正常缩放和显示 -->
    <title>小明的个人名片</title> <!-- 浏览器标签页上显示的文字 -->
    <link rel="stylesheet" href="style.css"> <!-- 引入外部样式文件，控制网页的外观 -->
    <!-- 引入 Font Awesome 图标库，用于显示邮箱等小图标（不依赖任何框架，只是图标字体） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body> <!-- 身体区域：所有用户能看到的内容都写在这里 -->

    <!-- ========== 页面主容器：把名片居中显示在屏幕中间 ========== -->
    <div class="page-container"> <!-- 最外层容器，用于把名片放到屏幕正中央 -->

        <!-- ========== 名片卡片主体 ========== -->
        <div class="card" id="card"> <!-- 名片卡片，id="card" 方便 JavaScript 找到它做动画 -->

            <!-- ========== 头像区域 ========== -->
            <div class="avatar-section"> <!-- 头像区域的外层容器 -->
                <div class="avatar" id="avatar"> <!-- 圆形头像的容器，id="avatar" 给 JS 做动画 -->
                    <!-- 占位头像：用一个灰色圆形 + 文字代替图片，主人以后换成真实图片 -->
                    <span class="avatar-placeholder">明</span> <!-- 头像占位文字，显示"明"字 -->
                </div>
            </div>

            <!-- ========== 名字区域 ========== -->
            <h1 class="name">小明</h1> <!-- h1 是最大的一级标题，用来显示名字 -->

            <!-- ========== 一句话介绍 ========== -->
            <p class="tagline">正在学习用 AI 开发程序</p> <!-- p 是段落标签，用来显示介绍文字 -->

            <!-- ========== 分割线 ========== -->
            <hr class="divider"> <!-- hr 是水平分割线，用来区分上下内容 -->

            <!-- ========== 联系方式区域 ========== -->
            <div class="contact-section"> <!-- 联系方式的容器 -->
                <div class="contact-item"> <!-- 每一行联系方式是一个 contact-item -->
                    <i class="fa-solid fa-envelope contact-icon"></i> <!-- 邮箱小图标，使用 Font Awesome -->
                    <span class="contact-text">xiaoming@example.com</span> <!-- 邮箱地址文字 -->
                </div>
            </div>

            <!-- ========== 底部按钮区域 ========== -->
            <div class="button-section"> <!-- 按钮区域的容器 -->
                <button class="btn-save" id="btnSave" onclick="saveContact()"> <!-- 保存联系方式的按钮 -->
                    <i class="fa-solid fa-floppy-disk"></i> 保存名片
                </button>
                <button class="btn-share" id="btnShare" onclick="shareCard()"> <!-- 分享名片的按钮 -->
                    <i class="fa-solid fa-share-nodes"></i> 分享名片
                </button>
            </div>

        </div> <!-- 名片卡片结束 -->

    </div> <!-- 页面容器结束 -->

    <!-- 引入外部脚本文件，放在 body 最下面是为了等页面加载完再执行脚本 -->
    <script src="script.js"></script>
</body>
</html>
